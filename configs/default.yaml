seed: 1337

logging:
  level: INFO

dataset:
  num_samples: 1500
  feature_dim: 32
  num_classes: 5
  train_ratio: 0.8

env:
  entropy_penalty_coef: 0.15
  kl_penalty_coef: 0.10
  kl_threshold: 0.08
  top_k: 1

training:
  learning_rate: 0.0007
  clip_epsilon: 0.2
  entropy_coef: 0.02
  value_coef: 0.5
  gamma: 0.99
  gae_lambda: 0.95
  max_grad_norm: 1.0
  train_iterations: 50
  steps_per_iter: 256
  update_epochs: 4
  minibatch_size: 64
  kl_abort_threshold: 0.15
  hidden_dim: 128
  output_dir: outputs/default_run

ood_thresholds:
  ood_accuracy_min: 0.35
  entropy_min: 1.00
  gradient_norm_max: 5.0
  generalization_gap_max: 0.25
  retrieval_kl_max: 0.60

reproducibility:
  dual_run_test: true
